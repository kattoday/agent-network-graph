name: Deploy Agent Graph
on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # Required for requesting the JWT (OIDC)
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::992878410915:role/GitHubActionRole
          aws-region: us-east-1

      - name: Install Dependencies
        run: |
          npm install -g aws-cdk
          pip install -r requirements.txt
          # Install dependencies for the Lambda environment
          cd lambda && pip install gremlinpython -t .
          cd ..

      - name: CDK Bootstrap
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1

      - name: CDK Deploy
        run: npx cdk deploy --require-approval never

      - name: Run Scraper and Trigger Ingestor
        run: python scraper.py
        env:
          AWS_REGION: us-east-1

